# Codacy Configuration
# Fixes: ESLint "No configuration found" error and binary file encoding issues

---
engines:
  # Disable ESLint - no .eslintrc config in this repo
  eslint:
    enabled: false

# Exclude binary files and generated outputs that cause encoding errors
exclude_paths:
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.webp"
  - "**/*.ico"
  - "**/*.pdf"
  - "**/*.zip"
  - "**/*.tar"
  - "**/*.gz"
  - "results.sarif"
  - "test_outputs/**"
  - "**/pixellab-*.png"
